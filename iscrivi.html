<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<title class="app-name">Gestione Gare</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="page">

<div class="wrapper">

<img class="app-logo" src="" width="120">

<h1 class="app-name"></h1>

<form id="athleteForm">

<div class="row">

<label>Competizione</label>

<select name="competizione" class="competition-select"></select>

</div>


<div class="row">

<label>Peso</label>

<select name="peso_categoria" class="weight-select"></select>

</div>


<div class="row">

<label>Nome</label>

<input type="text" name="nome" required>

</div>


<div class="row">

<label>Cognome</label>

<input type="text" name="cognome" required>

</div>


<button type="submit">Iscrivi atleta</button>

</form>

</div>

</div>


<script src="../js/app.js"></script>

<script>

async function loadConfig(){

const res = await fetch("../config_public.php");

const config = await res.json();


document.querySelectorAll(".app-logo").forEach(el=>{
    el.src = config.brand.logo;
});


document.querySelectorAll(".app-name").forEach(el=>{
    el.textContent = config.brand.name;
});


document.documentElement.style.setProperty("--primary", config.theme.primary);
document.documentElement.style.setProperty("--primary-dark", config.theme.primary_dark);


document.querySelectorAll(".competition-select").forEach(select=>{

select.innerHTML="";

config.competitions.forEach(c=>{

const opt=document.createElement("option");

opt.value=c;

opt.textContent=c;

select.appendChild(opt);

});

});


document.querySelectorAll(".weight-select").forEach(select=>{

select.innerHTML="";

config.weight_classes.forEach(w=>{

const opt=document.createElement("option");

opt.value=w.label;

opt.textContent=w.label;

select.appendChild(opt);

});

});

}

loadConfig();

</script>

</body>

</html>
