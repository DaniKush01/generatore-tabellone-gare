<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partecipazione Gare | Login</title>
  <link rel="stylesheet" href="css/style.css" />

  <!-- CSS minimale per il modale -->
  <style>
    :root { --ui-font: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }

    .modal { position: fixed; inset: 0; display: none; z-index: 1000; }
    .modal.show { display: block; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); }
    .modal-card {
      position: relative; max-width: 720px; margin: 8vh auto; background: #fff;
      border-radius: 10px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.2);
    }

    .msg { text-align: center; font-weight: 600; margin-top: 6px; }
    .msg.ok { color:#0a8a0a; } .msg.err { color:#c00; }

    .link-btn {
      background: none;
      border: none;
      color: #bf191b;
      cursor: pointer;
      font: inherit;
      padding: 0;
      text-decoration: underline;
    }

    textarea[name="messaggio"] {
      font-family: var(--ui-font);
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: .2px;
    }

    textarea[name="messaggio"]::placeholder {
      font-family: var(--ui-font);
      opacity: .7;
    }

    /* logo login */
    #logoLogin{
      max-width:200px;
      display:block;
      margin:auto;
    }

  </style>
</head>

<body>

  <div class="page">
    <div class="wrapper">

      <div class="row col-2">

        <div class="field">
          <img id="logoLogin" src="" alt="Logo">
        </div>

        <div class="field">

          <form id="loginForm">

            <input type="text" id="username" name="username" placeholder="Inserire Username" required>

            <input type="password" id="password" name="password" placeholder="Inserire Password" required>

            <div>
              <input type="checkbox" id="mostra_password" name="mostra_password">
              <label for="mostra_password" id="toggle_pw_label">Mostra password</label>
            </div>

            <button id="login_button" type="submit">Accedi</button>

            <p id="login_error" style="color:#ff0000; display:none;"></p>

            <p style="text-align:center; margin-top:8px;">
              Non hai un account?
              <a href="#" id="btnRichCred" class="link-btn">Richiedi credenziali</a>
            </p>

          </form>

        </div>

      </div>
    </div>
  </div>


  <!-- Modale Richiesta Credenziali -->
  <div id="reqModal" class="modal" aria-hidden="true">

    <div class="modal-backdrop" id="reqBackdrop"></div>

    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="reqTitle">

      <div class="row">
        <div class="field">
          <h3 id="reqTitle" style="margin:0 0 8px;">Richiedi credenziali</h3>
        </div>
      </div>

      <form id="reqForm" class="row" style="margin-top:0px; flex-wrap:wrap;">

        <div class="row col-2" style="margin:0px;">
          <div class="field">
            <input type="text" name="palestra" placeholder="Palestra *" required>
          </div>

          <div class="field">
            <input type="text" name="referente" placeholder="Referente *" required>
          </div>
        </div>

        <div class="row col-2" style="margin:0px;">
          <div class="field">
            <input type="email" name="email" placeholder="Email *" required>
          </div>

          <div class="field">
            <input type="tel" name="telefono" placeholder="Telefono">
          </div>
        </div>

        <div class="row" style="margin:0px;">
          <div class="field" style="width:100%;">
            <textarea name="messaggio" placeholder="Messaggio" rows="4"></textarea>
          </div>
        </div>

        <div style="display:none;">
          <input name="website" tabindex="-1" autocomplete="off">
        </div>

        <div class="row col-2" style="margin:0px;">
          <div class="field">
            <button type="button" id="reqCancel">Annulla</button>
          </div>

          <div class="field" style="text-align:right;">
            <button type="submit" id="reqSubmit">Invia richiesta</button>
          </div>
        </div>

        <div id="reqMsg" class="msg" aria-live="polite"></div>

      </form>

    </div>

  </div>


  <!-- LOGIN SCRIPT -->
  <script src="js/login.js"></script>


  <!-- CARICAMENTO LOGO DAL CONFIG -->
  <script>

  fetch('/gestione_gare/config/config_public.php')
  .then(r => r.json())
  .then(cfg => {

      const logo = document.getElementById('logoLogin');

      if(cfg.brand && cfg.brand.logo){
          logo.src = cfg.brand.logo;
      }

  })
  .catch(()=>{
      console.warn("config_public non trovato");
  });

  </script>


  <!-- MODALE RICHIESTA CREDENZIALI -->
  <script>
    (function initRequestCredentials() {

      const btnOpen  = document.getElementById('btnRichCred');
      const modal    = document.getElementById('reqModal');
      const backdrop = document.getElementById('reqBackdrop');
      const btnCancel= document.getElementById('reqCancel');
      const form     = document.getElementById('reqForm');
      const msg      = document.getElementById('reqMsg');
      const submit   = document.getElementById('reqSubmit');

      if (!btnOpen || !modal || !form) return;

      const open  = () => {
        modal.classList.add('show');
        msg.textContent='';
        msg.className='msg';
      };

      const close = () => {
        modal.classList.remove('show');
        form.reset();
        msg.textContent='';
        msg.className='msg';
      };

      btnOpen.addEventListener('click', (e)=>{
        e.preventDefault();
        open();
      });

      backdrop.addEventListener('click', close);
      btnCancel.addEventListener('click', close);

      form.addEventListener('submit', async (e)=>{

        e.preventDefault();

        msg.textContent='';
        msg.className='msg';

        const email = form.querySelector('input[name="email"]').value.trim();

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          msg.textContent='Email non valida';
          msg.className='msg err';
          return;
        }

        try {

          submit.disabled=true;
          const orig = submit.textContent;
          submit.textContent='Invio…';

          const res = await fetch('/gestione_gare/request_account.php',{
            method:'POST',
            body:new FormData(form)
          });

          const out = await res.json();

          if(!res.ok || out.error) throw new Error(out.error || 'Errore invio');

          msg.textContent='Richiesta inviata. Ti risponderemo al più presto.';
          msg.className='msg ok';

          setTimeout(close,1200);

          submit.textContent=orig;
          submit.disabled=false;

        } catch(err){

          msg.textContent = err.message || 'Errore';
          msg.className='msg err';
          submit.disabled=false;
          submit.textContent='Invia richiesta';

        }

      });

    })();
  </script>

</body>
</html>
