<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partecipazione Gare | Menu</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* styling leggero per il bottone icona */
        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 10px;
            /* simile agli altri nav-btn */
        }

        .icon-btn svg {
            width: 22px;
            height: 22px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="wrapper">
            <div class="navbar" style="padding: 0%;">
                <div class="row col-4" style="margin: 0px;">
                    <div class="field" style="width: 5%;">
                    </div>
                    <div class="field" style="width: 20%;">
                        <button class="nav-btn" id="navBack">← Indietro</button>
                    </div>
                    <div class="field" style="width: 40%;">
                        <button class="nav-btn" id="navHome">Home</button>
                    </div>
                    <div class="field" style="width: 20%;">
                        <button class="nav-btn" id="navFwd">→ Avanti</button>
                    </div>
                    <div class="field" style="width: 5%;">
                    </div>
                    <div class="field" style="width: 10%;">
                        <!-- Icona logout al posto del testo -->
                        <button class="nav-btn icon-btn" id="btnLogout" aria-label="Esci" title="Esci">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                aria-hidden="true">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                <polyline points="16 17 21 12 16 7" />
                                <line x1="21" y1="12" x2="9" y2="12" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- pulsanti visibili a tutti -->
            <div class="row col-2">
                <div class="field">
                    <button id="btnIscrivi">Iscrivi Atleta</button>
                </div>
                <div class="field">
                    <button id="btnGestisci">Gestisci Atleti</button>
                </div>
            </div>

            <!-- sezione visibile solo ad admin -->
            <div class="row col-2" id="viewAdmin" style="display:none;">
                <div class="field">
                    <button id="btnTabellone">Visualizza Tabellone</button>
                </div>
                <div class="field">
                    <button id="btnUtenti">Gestione Utenti</button>
                </div>
            </div>
            <div class="row col-2">
                <div class="field">
                    <button id="btnTuttiAtleti" class="btn">Tutti gli Atleti</button>
                </div>
                <div class="field">
                    <!--
                    <button id="btnProfilo" class="btn">Profilo</button>
                    -->

                </div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/nav.js"></script>
</body>

</html>
